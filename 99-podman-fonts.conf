<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- 1. 针对 Podman Desktop 使用的 ui-sans-serif 和 system-ui -->
  <match target="pattern">
    <test qual="any" name="family"><string>system-ui</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>ui-sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>

  <!-- 2. 针对 Podman Desktop 使用的 ui-monospace 和 monospace -->
  <match target="pattern">
    <test qual="any" name="family"><string>ui-monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrains Mono</string>
      <string>Noto Sans Mono CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrains Mono</string>
      <string>Noto Sans Mono CJK SC</string>
    </edit>
  </match>

  <!-- 3. 防止 Font Awesome 干扰普通文本渲染 -->
  <match target="pattern">
    <test name="family"><string>Font Awesome 7 Free</string></test>
    <edit name="family" mode="append" binding="strong">
      <string>Inter</string>
    </edit>
  </match>

</fontconfig>
